<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <title>MediaLink.ro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        /* ✅ LIMITARE STRICTA 2 RANDURI TITLU */
        .line-clamp-2 {
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; height: 2.8rem; line-height: 1.4rem;
        }
        .active-cat { color: #FF2800 !important; border-bottom: 2px solid #FF2800; font-weight: 900; }
    </style>
</head>
<body class="antialiased border-t-[8px] border-[#FF2800]">
    <header class="py-10 text-center">
        <h1 class="serif-italic text-6xl font-black">MediaLink<span class="text-[#FF2800]">.</span>ro</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 mt-2 italic">Intelligence Hub • LIVE 48H</p>
    </header>
    <nav class="sticky top-0 bg-white border-y border-gray-100 z-50 py-4 flex justify-center gap-8 text-[11px] font-black uppercase tracking-widest text-gray-400">
        <button onclick="filtru('Toate', this)" class="active-cat">Toate</button>
        <button onclick="filtru('Politica', this)">Politica</button>
        <button onclick="filtru('Economie', this)">Economie</button>
        <button onclick="filtru('Sport', this)">Sport</button>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-10"></div>
    </main>
    <script>
        let rawData = [];
        async function init() {
            const resp = await fetch('feed.xml?v=' + Date.now());
            const xml = new DOMParser().parseFromString(await resp.text(), "text/xml");
            rawData = Array.from(xml.querySelectorAll("item")).map(el => ({
                t: el.querySelector("title")?.textContent,
                u: el.querySelector("link")?.textContent,
                d: el.querySelector("pubDate")?.textContent,
                s: el.querySelector("source_name")?.textContent,
                c: el.querySelector("category_name")?.textContent,
                i: el.getElementsByTagNameNS("http://search.yahoo.com/mrss/", "content")[0]?.getAttribute("url")
            }));
            
            // ✅ SORTARE: Cele mai noi sus
            rawData.sort((a, b) => new Date(b.d) - new Date(a.d));
            
            render(rawData);
        }
        function render(data) {
            document.getElementById('news-grid').innerHTML = data.map(item => 
                <article class="cursor-pointer group" onclick="window.open('', '_blank')">
                    <img src="" class="w-full aspect-video object-cover rounded-lg mb-4 shadow-sm">
                    <div class="text-[10px] font-black text-[#FF2800] uppercase underline mb-1"></div>
                    <h3 class="serif-italic text-lg font-bold line-clamp-2 group-hover:text-[#FF2800] tracking-tight"></h3>
                </article>).join('');
        }
        function filtru(cat, btn) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            render(cat === 'Toate' ? rawData : rawData.filter(x => x.c === cat));
        }
        window.onload = init;
    </script>
</body>
</html>
