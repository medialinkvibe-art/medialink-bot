<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaLink.ro | Intelligence Hub</title>
    <link rel="icon" type="image/png" href="favicon32.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a; margin: 0; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        .premium-title {
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
            overflow: hidden; height: 3rem; line-height: 1.5rem;
            font-size: 1.15rem; font-weight: 800; letter-spacing: -0.02em;
            transition: color 0.2s ease;
        }
        article:hover .premium-title { color: #FF2800; }
        .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
        .active-cat { color: #FF2800 !important; border-bottom: 2px solid #FF2800; font-weight: 900; }
        #news-alert { background: #FF2800; color: white; padding: 10px 0; font-weight: 900; text-transform: uppercase; font-size: 11px; }
        #gdpr-box { position: fixed; bottom: 20px; left: 20px; background: #000; color: #fff; padding: 20px; border-radius: 12px; z-index: 1000; font-size: 12px; max-width: 320px; display: none; }
        a.contact-link:hover { color: #FF2800; }
    </style>
</head>
<body class="antialiased border-t-[8px] border-[#FF2800]">

    <div id="news-alert">
        <div class="max-w-7xl mx-auto px-6 flex items-center gap-4">
            <span class="bg-white text-[#FF2800] px-2 py-0.5 rounded text-[10px] font-black italic shadow-sm">NEWS ALERT</span>
            <marquee id="alert-text" scrollamount="6"></marquee>
        </div>
    </div>

    <header class="py-16 text-center">
        <h1 class="serif-italic text-7xl font-black tracking-tighter cursor-pointer" onclick="location.reload()">MediaLink<span style="color:#FF2800">.</span>ro</h1>
        <div class="flex items-center justify-center gap-2 mt-4">
            <span class="live-dot"></span>
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-gray-400 italic">Intelligence Hub • LIVE 48H</p>
        </div>
    </header>

    <nav class="sticky top-0 bg-white/95 backdrop-blur-md border-y border-gray-100 z-50 py-5">
        <div class="max-w-7xl mx-auto px-6 flex justify-center gap-10 text-[11px] font-black uppercase tracking-widest text-gray-400">
            <button onclick="filtru('Toate', this)" class="active-cat">Toate</button>
            <button onclick="filtru('Actualitate', this)">Actualitate</button>
            <button onclick="filtru('Politica', this)">Politica</button>
            <button onclick="filtru('Economie', this)">Economie</button>
            <button onclick="filtru('Sport', this)">Sport</button>
            <button onclick="filtru('Monden', this)">Monden</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-3 gap-x-12 gap-y-16"></div>
    </main>

    <footer class="bg-gray-50 border-t border-gray-100 py-16 text-center text-[11px] text-gray-400">
        <div class="flex justify-center gap-8 mb-6 font-black uppercase tracking-widest">
            <a href="#" class="hover:text-black">GDPR</a>
            <a href="#" class="hover:text-black">Cookies</a>
            <a href="#" class="hover:text-black">Termeni</a>
        </div>
        <p>Contact: <a href="mailto:contact@medialink.ro" class="contact-link font-bold text-black text-xs transition-colors">contact@medialink.ro</a></p>
    </footer>

    <div id="gdpr-box">
        <p class="mb-4">Acceptați utilizarea cookie-urilor pentru o experiență premium?</p>
        <div class="flex gap-3">
            <button onclick="gdpr(1)" class="w-full bg-[#FF2800] py-2 rounded font-black uppercase text-[10px]">Accept</button>
            <button onclick="gdpr(0)" class="w-full bg-gray-700 py-2 rounded font-black uppercase text-[10px]">Refuz</button>
        </div>
    </div>

    <script>
        let rawData = [];
        const FORTY_EIGHT_HOURS = 48 * 60 * 60 * 1000;

        async function init() {
            try {
                const resp = await fetch('feed.xml?v=' + Date.now());
                const xml = new DOMParser().parseFromString(await resp.text(), "text/xml");
                const now = new Date().getTime();

                rawData = Array.from(xml.querySelectorAll("item")).map(el => ({
                    t: el.querySelector("title")?.textContent || "",
                    u: el.querySelector("link")?.textContent || "#",
                    d: new Date(el.querySelector("pubDate")?.textContent).getTime(),
                    s: el.querySelector("source_name")?.textContent || "INFO",
                    c: el.querySelector("category_name")?.textContent || "Actualitate",
                    i: el.getElementsByTagNameNS("http://search.yahoo.com/mrss/", "content")[0]?.getAttribute("url") || ""
                })).filter(item => (now - item.d) < FORTY_EIGHT_HOURS);

                rawData.sort((a, b) => b.d - a.d);
                if(rawData.length > 0) document.getElementById('alert-text').innerText = rawData[0].t;
                render(rawData);
            } catch (e) { console.error(e); }
        }

        function render(data) {
            document.getElementById('news-grid').innerHTML = data.map(item => `
                <article class="cursor-pointer group" onclick="window.open('${item.u}', '_blank')">
                    <div class="aspect-video overflow-hidden rounded-xl bg-gray-100 mb-5 shadow-sm">
                        <img src="${item.i}" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=800'">
                    </div>
                    <div class="text-[10px] font-black text-[#FF2800] uppercase mb-2 underline underline-offset-4 decoration-2">${item.s}</div>
                    <h3 class="premium-title">${item.t}</h3>
                </article>`).join('');
        }

        function filtru(cat, btn) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            render(cat === 'Toate' ? rawData : rawData.filter(x => x.c === cat));
        }

        function gdpr(val) { localStorage.setItem('gdpr_choice', val); document.getElementById('gdpr-box').style.display = 'none'; }
        window.onload = () => { init(); if(!localStorage.getItem('gdpr_choice')) document.getElementById('gdpr-box').style.display = 'block'; };
    </script>
</body>
</html>
