<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaLink.ro</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/21/21601.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #fff; color: #000; margin: 0; }
        .grid-news { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: #eee; border: 1px solid #eee; }
        .card-news { background: #fff; padding: 20px; cursor: pointer; transition: 0.2s; }
        .card-news:hover { background: #fafafa; }
        .card-news:hover h2 { color: #FF2800; }
        .img-news { width: 100%; aspect-ratio: 16/9; object-fit: cover; margin-bottom: 12px; }
        .alert-red { background: #FF2800; color: #fff; font-weight: 900; font-size: 11px; padding: 10px; text-transform: uppercase; }
        #gdpr-box { position: fixed; bottom: 0; width: 100%; background: #000; color: #fff; padding: 20px; z-index: 1000; display: none; }
        .nav-active { color: #FF2800; border-bottom: 2px solid #FF2800; }
    </style>
</head>
<body>
    <div class="alert-red">
        <marquee id="ticker-news">MediaLink.ro • Intelligence Hub • Sincronizare Live Active</marquee>
    </div>

    <header class="p-8 border-b flex flex-col md:flex-row justify-between items-center">
        <div>
            <h1 class="text-5xl font-black tracking-tighter uppercase cursor-pointer" onclick="location.reload()">MediaLink<span class="text-[#FF2800]">.</span>ro</h1>
            <p class="text-[10px] font-bold text-gray-400 uppercase tracking-widest mt-1">SC BOLD PANDA SRL</p>
        </div>
        <nav class="flex gap-6 text-[11px] font-black uppercase mt-4 md:mt-0">
            <button onclick="filter('Toate', this)" class="nav-active">Toate</button>
            <button onclick="filter('Actualitate', this)">Actualitate</button>
            <button onclick="filter('Politica', this)">Politica</button>
            <button onclick="filter('Economie', this)">Economie</button>
        </nav>
    </header>

    <main class="grid-news" id="news-container"></main>

    <footer class="p-10 border-t flex justify-between items-center text-[10px] font-bold text-gray-400 uppercase tracking-widest">
        <div>© 2026 SC BOLD PANDA SRL</div>
        <div class="flex gap-6">
            <button onclick="alert('Conținutul aparține surselor citate.')">Termeni</button>
            <button onclick="alert('Nu stocăm date personale.')">GDPR</button>
            <span>contact@medialink.ro</span>
        </div>
    </footer>

    <div id="gdpr-box">
        <div class="flex justify-between items-center max-w-7xl mx-auto">
            <p class="text-[10px] font-bold uppercase">Folosim cookie-uri pentru funcționare.</p>
            <div class="flex gap-4">
                <button onclick="accept(true)" class="bg-[#FF2800] px-6 py-2 text-[10px] font-black">ACCEPT</button>
                <button onclick="accept(false)" class="border px-6 py-2 text-[10px] font-black">REFUZ</button>
            </div>
        </div>
    </div>

    <script>
        // URL CORECTAT (ADĂUGAT "j"-ul LIPSĂ)
        const U = "https://hdzbcjljqdkricyunaten.supabase.co";
        const K = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhkemJjbGpxZGtyaWN5dW5hdGVuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MDAxMDcsImV4cCI6MjA4OTE3NjEwN30.nS1eXCy10Q6r8hi9CAP-RUZfo9-YsNNjx5yNA9jvNzM";
        let list = [];

        async function load() {
            const r = await fetch(`${U}/rest/v1/stiri?select=*&order=created_at.desc`, {
                headers: { "apikey": K, "Authorization": `Bearer ${K}` }
            });
            list = await r.json();
            if(list.length > 0) document.getElementById('ticker-news').innerText = list[0].titlu;
            draw(list);
        }

        function draw(data) {
            document.getElementById('news-container').innerHTML = data.map(n => `
                <div class="card-news" onclick="window.open('${n.url_sursa}')">
                    <img src="${n.imagine_url}" class="img-news">
                    <p class="text-[9px] font-black text-[#FF2800] uppercase mb-1">${n.sursa_nume}</p>
                    <h2 class="text-lg font-black leading-tight uppercase">${n.titlu}</h2>
                </div>
            `).join('');
        }

        function filter(c, b) {
            document.querySelectorAll('nav button').forEach(x => x.className = '');
            b.className = 'nav-active';
            draw(c === 'Toate' ? list : list.filter(x => x.categorie === c));
        }

        function accept(v) { localStorage.setItem('gdpr_v3', v); document.getElementById('gdpr-box').style.display = 'none'; }
        window.onload = () => { load(); if(!localStorage.getItem('gdpr_v3')) document.getElementById('gdpr-box').style.display = 'block'; };
    </script>
</body>
</html>
