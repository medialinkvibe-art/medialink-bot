<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaLink.ro | Intelligence Hub</title>
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/medialinkvibe-art/medialink-bot/main/favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ferrari-red: #FF2800; }
        body { font-family: 'Inter', sans-serif; background: #fff; color: #1a1a1a; margin: 0; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        
        /* ✅ INCADRARE PREMIUM TITLU - MAX 2 RANDURI */
        .premium-title {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            height: 3rem; 
            line-height: 1.5rem;
            font-size: 1.125rem;
            font-weight: 800;
            letter-spacing: -0.02em;
            transition: color 0.3s ease;
        }
        
        /* ✅ HOVER ROSU PE TITLU */
        article:hover .premium-title { color: var(--ferrari-red); }

        .active-cat { color: var(--ferrari-red) !important; border-bottom: 3px solid var(--ferrari-red); font-weight: 900; }
        
        #news-alert { background: var(--ferrari-red); color: white; padding: 12px 0; font-weight: 900; text-transform: uppercase; font-size: 11px; letter-spacing: 0.1em; }
        
        /* ✅ LIVE DOT */
        .live-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { opacity: 1; transform: scale(1); } 50% { opacity: 0.3; transform: scale(1.2); } 100% { opacity: 1; transform: scale(1); } }

        /* ✅ GDPR BOX */
        #gdpr-box { position: fixed; bottom: 20px; left: 20px; background: #000; color: #fff; padding: 20px; border-radius: 12px; z-index: 1000; font-size: 12px; max-width: 320px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: none; }
        
        article img { transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        article:hover img { transform: scale(1.05); }

        a.contact-link { color: inherit; text-decoration: none; transition: color 0.2s; }
        a.contact-link:hover { color: var(--ferrari-red); }
    </style>
</head>
<body class="antialiased border-t-[8px] border-[#FF2800]">

    <div id="news-alert">
        <div class="max-w-7xl mx-auto px-6 flex items-center gap-6">
            <span class="bg-white text-[#FF2800] px-2 py-0.5 rounded text-[10px] shrink-0 italic">NEWS ALERT</span>
            <marquee id="alert-text" scrollamount="5"></marquee>
        </div>
    </div>

    <header class="py-16 text-center">
        <h1 class="serif-italic text-7xl font-black tracking-tighter cursor-pointer" onclick="location.reload()">
            MediaLink<span style="color:#FF2800">.</span>ro
        </h1>
        <div class="flex items-center justify-center gap-2 mt-4">
            <span class="live-dot"></span>
            <p class="text-[10px] font-bold uppercase tracking-[0.4em] text-gray-400 italic">Intelligence Hub • LIVE 24/7</p>
        </div>
    </header>

    <nav class="sticky top-0 bg-white/95 backdrop-blur-md border-y border-gray-100 z-50 py-5">
        <div class="max-w-7xl mx-auto px-6 flex justify-center gap-10 text-[11px] font-black uppercase tracking-widest text-gray-400">
            <button onclick="filtru('Toate', this)" class="active-cat">Toate</button>
            <button onclick="filtru('Actualitate', this)">Actualitate</button>
            <button onclick="filtru('Politica', this)">Politica</button>
            <button onclick="filtru('Economie', this)">Economie</button>
            <button onclick="filtru('Sport', this)">Sport</button>
            <button onclick="filtru('Monden', this)">Monden</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-16">
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-12 gap-y-16">
            </div>
    </main>

    <footer class="bg-gray-50 border-t border-gray-100 py-16 text-center text-[11px] text-gray-400">
        <div class="flex justify-center gap-8 mb-6 font-black uppercase tracking-widest">
            <a href="#" class="hover:text-black">GDPR</a>
            <a href="#" class="hover:text-black">Cookies</a>
            <a href="#" class="hover:text-black">Termeni</a>
        </div>
        <p>Contact: <a href="mailto:contact@medialink.ro" class="contact-link font-bold text-black text-xs">contact@medialink.ro</a></p>
    </footer>

    <div id="gdpr-box">
        <p class="mb-4 leading-relaxed">Protejăm datele tale. Continuarea navigării implică acceptarea politicilor noastre de tip Cookie și GDPR.</p>
        <div class="flex items-center gap-4">
            <button onclick="acceptGDPR()" class="w-full bg-[#FF2800] py-2.5 rounded-lg font-black uppercase text-[10px] shadow-sm">Accept</button>
            <button onclick="refuzGDPR()" class="w-full bg-gray-600 py-2.5 rounded-lg font-black uppercase text-[10px]">Refuz</button>
        </div>
    </div>

    <script>
        let rawData = [];
        async function init() {
            try {
                const resp = await fetch('feed.xml?v=' + Date.now());
                if (!resp.ok) throw new Error('Feed lipsește');
                const xml = new DOMParser().parseFromString(await resp.text(), "text/xml");
                
                rawData = Array.from(xml.querySelectorAll("item")).map(el => ({
                    t: el.querySelector("title")?.textContent || "",
                    u: el.querySelector("link")?.textContent || "#",
                    d: el.querySelector("pubDate")?.textContent || "",
                    s: el.querySelector("source_name")?.textContent || "INFO",
                    c: el.querySelector("category_name")?.textContent || "Actualitate",
                    i: el.getElementsByTagNameNS("http://search.yahoo.com/mrss/", "content")[0]?.getAttribute("url") || "https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=800"
                }));

                rawData.sort((a, b) => new Date(b.d) - new Date(a.d));
                if(rawData.length > 0) document.getElementById('alert-text').innerText = rawData[0].t;
                render(rawData);
            } catch (e) { 
                document.getElementById('news-grid').innerHTML = '<p class="col-span-full text-center text-gray-400 uppercase text-xs tracking-widest">Sincronizare feed...</p>';
            }
        }

        function render(data) {
            document.getElementById('news-grid').innerHTML = data.map(item => `
                <article class="cursor-pointer" onclick="window.open('${item.u}', '_blank')">
                    <div class="aspect-video overflow-hidden rounded-xl bg-gray-100 mb-6 shadow-sm">
                        <img src="${item.i}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700" onerror="this.src='https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=800'">
                    </div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-[10px] font-black text-[#FF2800] uppercase underline decoration-2 underline-offset-4">${item.s}</span>
                        <span class="text-[9px] text-gray-300">•</span>
                        <span class="text-[9px] font-bold text-gray-400 uppercase">${new Date(item.d).toLocaleDateString('ro-RO')}</span>
                    </div>
                    <h3 class="premium-title">${item.t}</h3>
                </article>`).join('');
        }

        function filtru(cat, btn) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            render(cat === 'Toate' ? rawData : rawData.filter(x => x.c === cat));
        }

        /* ✅ FUNCȚII GDPR */
        function acceptGDPR() { localStorage.setItem('gdpr_v1', 'accepted'); document.getElementById('gdpr-box').style.display = 'none'; }
        function refuzGDPR() { localStorage.setItem('gdpr_v1', 'refused'); document.getElementById('gdpr-box').style.display = 'none'; }
        
        window.onload = () => { 
            init(); 
            if(!localStorage.getItem('gdpr_v1')) document.getElementById('gdpr-box').style.display = 'block'; 
        };
    </script>
</body>
</html>
