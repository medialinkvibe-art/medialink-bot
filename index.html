<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediaLink.ro | Intelligence Hub</title>
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/21/21601.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,900&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --ferrari-red: #FF2800; }
        body { font-family: 'Inter', sans-serif; background: #fff; margin: 0; }
        .serif-italic { font-family: 'Playfair Display', serif; font-style: italic; }
        .line-clamp-2 { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; height: 2.8rem; line-height: 1.4rem; }
        .active-cat { color: var(--ferrari-red) !important; border-bottom: 2px solid var(--ferrari-red); font-weight: 900; }
        #news-alert { background: var(--ferrari-red); color: white; padding: 10px; display: none; font-weight: 900; text-transform: uppercase; font-size: 12px; }
        #gdpr-box { position: fixed; bottom: 20px; left: 20px; background: #1a1a1a; color: white; padding: 15px; border-radius: 8px; z-index: 1000; font-size: 11px; max-width: 300px; display: none; }
    </style>
</head>
<body class="antialiased border-t-[8px] border-[#FF2800]">
    
    <div id="news-alert">
        <div class="max-w-7xl mx-auto px-6 flex items-center gap-4">
            <span class="bg-white text-[#FF2800] px-2 py-0.5 rounded text-[10px]">NEWS ALERT</span>
            <marquee id="alert-text"></marquee>
        </div>
    </div>

    <header class="py-12 text-center">
        <h1 class="serif-italic text-6xl font-black tracking-tighter cursor-pointer" onclick="location.reload()">MediaLink<span class="text-[#FF2800]">.</span>ro</h1>
        <p class="text-[10px] font-bold uppercase tracking-[0.3em] text-gray-400 mt-2 italic">Intelligence Hub • LIVE 48H</p>
    </header>

    <nav class="sticky top-0 bg-white/95 backdrop-blur border-y border-gray-100 z-50 py-4 overflow-x-auto">
        <div class="max-w-7xl mx-auto px-6 flex justify-center gap-6 text-[11px] font-black uppercase tracking-widest text-gray-400">
            <button onclick="filtru('Toate', this)" class="active-cat">Toate</button>
            <button onclick="filtru('Actualitate', this)">Actualitate</button>
            <button onclick="filtru('Politica', this)">Politica</button>
            <button onclick="filtru('Economie', this)">Economie</button>
            <button onclick="filtru('Sport', this)">Sport</button>
            <button onclick="filtru('Monden', this)">Monden</button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-12">
        <div id="news-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-12">
            </div>
    </main>

    <div id="gdpr-box">
        <p class="mb-3">Folosim cookie-uri pentru a îmbunătăți experiența MediaLink.ro.</p>
        <button onclick="acceptGDPR()" class="bg-[#FF2800] px-4 py-1.5 rounded font-bold uppercase text-[10px]">Accept</button>
    </div>

    <script>
        let rawData = [];
        async function init() {
            try {
                const resp = await fetch('feed.xml?v=' + Date.now());
                const xml = new DOMParser().parseFromString(await resp.text(), "text/xml");
                const items = xml.querySelectorAll("item");
                
                rawData = Array.from(items).map(el => ({
                    t: el.querySelector("title")?.textContent || "",
                    u: el.querySelector("link")?.textContent || "#",
                    d: el.querySelector("pubDate")?.textContent || "",
                    s: el.querySelector("source_name")?.textContent || "INFO",
                    c: el.querySelector("category_name")?.textContent || "Actualitate",
                    i: el.getElementsByTagNameNS("http://search.yahoo.com/mrss/", "content")[0]?.getAttribute("url") || "https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=800"
                }));

                rawData.sort((a, b) => new Date(b.d) - new Date(a.d));
                
                if(rawData.length > 0) {
                    document.getElementById('news-alert').style.display = 'block';
                    document.getElementById('alert-text').innerText = rawData[0].t;
                }
                
                render(rawData);
            } catch (e) { console.error(e); }
        }

        function render(data) {
            document.getElementById('news-grid').innerHTML = data.map(item => 
                <article class="cursor-pointer group" onclick="window.open('', '_blank')">
                    <div class="aspect-video overflow-hidden rounded-lg bg-gray-100 mb-4 shadow-sm">
                        <img src="" class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-105" onerror="this.src='https://images.unsplash.com/photo-1504711434969-e33886168f5c?q=80&w=800'">
                    </div>
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-[10px] font-black text-[#FF2800] uppercase underline"></span>
                        <span class="text-[9px] text-gray-300">•</span>
                        <span class="text-[9px] font-bold text-gray-400 uppercase"></span>
                    </div>
                    <h3 class="serif-italic text-lg font-bold line-clamp-2 group-hover:text-[#FF2800] leading-tight transition-colors"></h3>
                </article>).join('');
        }

        function filtru(cat, btn) {
            document.querySelectorAll('nav button').forEach(b => b.classList.remove('active-cat'));
            btn.classList.add('active-cat');
            const clean = (t) => t.toLowerCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            render(cat === 'Toate' ? rawData : rawData.filter(x => clean(x.c) === clean(cat)));
        }

        function acceptGDPR() { localStorage.setItem('gdpr_ok', 'true'); document.getElementById('gdpr-box').style.display = 'none'; }
        
        window.onload = () => {
            init();
            if(!localStorage.getItem('gdpr_ok')) document.getElementById('gdpr-box').style.display = 'block';
        };
    </script>
</body>
</html>
